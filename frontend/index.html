<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Poteshu - 友達とYouTube</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for modern looks */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen w-screen overflow-hidden flex flex-col">
    <!-- Header -->
    <header class="bg-slate-800 p-4 shadow-md flex items-center justify-between border-b border-slate-700">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-yellow-200">
            🥔 Poteshu
        </h1>
        <div class="text-sm text-slate-400 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse delay-75"></span>
            Server Active
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Pane: Subtitles Log -->
        <div class="w-1/3 border-r border-slate-700 flex flex-col bg-slate-800/50">
            <div class="p-3 bg-slate-800/80 border-b border-slate-700 font-semibold text-slate-300 flex items-center justify-between shadow-sm z-10">
                <span class="flex flex-col gap-0.5 pb-1 w-full">
                    <span class="flex items-center justify-between w-full">
                        <span class="flex items-center gap-2">▶ YouTube Subtitles</span>
                        <span class="px-2 py-0.5 rounded text-xs bg-red-500/20 text-red-400 border border-red-500/30 animate-pulse">Live</span>
                    </span>
                    <span id="video-title-display" class="text-xs text-yellow-400 font-normal truncate max-w-full">Waiting for YouTube...</span>
                </span>
            </div>
            <div id="subtitle-log" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm text-slate-400 font-mono">
                <div class="text-center text-slate-500 mt-10">YouTubeを再生するとここに字幕が流れます...</div>
            </div>
        </div>

        <!-- Right Pane: LINE Style Chat -->
        <div class="w-2/3 flex flex-col bg-slate-900">
            <div class="p-3 bg-slate-800 border-b border-slate-700 font-semibold text-slate-200 shadow-sm z-10 flex items-center justify-between">
                <span>💬 AIフレンド</span>
                <button id="clear-btn" class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1.5 rounded transition-colors shadow-sm flex items-center gap-1 shadow-inner">
                    🧹 話題をリセット
                </button>
            </div>
            <div id="chat-log" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col">
                <!-- AI Placeholder Bubble -->
                <div class="flex justify-start">
                    <div id="welcome-message" class="bg-slate-800 text-slate-200 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%] shadow-sm">
                        <!-- Dynamic greeting will be inserted here -->
                    </div>
                </div>
            </div>
            
            <!-- Chat Input -->
            <div class="p-4 bg-slate-800 border-t border-slate-700 pb-8">
                <form id="chat-form" class="flex gap-2 items-end">
                    <textarea id="chat-input" rows="2" class="flex-1 bg-slate-700 border border-slate-600 rounded-2xl px-5 py-3 text-slate-100 focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition-all shadow-inner resize-none min-h-[50px] leading-relaxed" placeholder="「今のどう思う？」 (Enterで送信 / Shift+Enterで改行)"></textarea>
                    <button type="submit" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold rounded-full px-8 py-3 h-[50px] transition-colors duration-200 shadow-md transform hover:scale-105">
                        送信
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Frontend Logic -->
    <script>
        // Setup Tailwind Custom Config
        tailwind.config = {
            theme: {
                extend: {
                    animation: { 'fade-in': 'fadeIn 0.3s ease-out' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateX(-10px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } } }
                }
            }
        };

        // 0. Setup initial greeting
        const greetings = [
            "やっほー！今日はどんな動画見るの？✨",
            "準備おっけー！一緒に楽しもうねっ！😆",
            "お疲れ様！動画見ながらのんびりしよー！🥤",
            "わくわく！早く再生してー！👀",
            "えっへへ、一緒に見るの楽しみにしてたよ！💖"
        ];
        const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
        const welcomeBubble = document.getElementById('welcome-message');
        if (welcomeBubble) {
            welcomeBubble.innerHTML = `${randomGreeting}<br><span class="text-xs text-slate-500 mt-1 block">System: 拡張機能をChromeに入れてYouTubeの字幕をオンにしてね</span>`;
        }

        // 1. SSE for Subtitles
        const subtitleLog = document.getElementById('subtitle-log');
        let subtitleStarted = false;
        
        const sse = new EventSource('/stream');
        sse.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                
                if (data.title) {
                    const titleHeader = document.getElementById('video-title-display');
                    if (titleHeader) titleHeader.textContent = data.title;
                }

                if (data.type === 'subtitle') {
                    if (!subtitleStarted) {
                        subtitleLog.innerHTML = '';
                        subtitleStarted = true;
                    }
                    const div = document.createElement('div');
                    div.className = "bg-slate-800/80 rounded px-3 py-2 border-l-2 border-slate-500 animate-fade-in text-slate-300";
                    div.textContent = data.text;
                    subtitleLog.appendChild(div);
                    // Auto scroll
                    subtitleLog.scrollTop = subtitleLog.scrollHeight;
                }
            } catch (e) {
                // Just in case we receive plain text
            }
        };

        // 2. Chat Logic
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatLog = document.getElementById('chat-log');

        function appendMessage(text, isUser=false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const pill = document.createElement('div');
            pill.className = `whitespace-pre-wrap rounded-2xl px-4 py-3 max-w-[80%] shadow-sm ${
                isUser 
                ? 'bg-yellow-500 text-slate-900 rounded-tr-sm font-medium' 
                : 'bg-slate-800 text-slate-200 rounded-tl-sm'
            }`;
            pill.textContent = text;
            wrapper.appendChild(pill);
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
            return pill;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;
            
            appendMessage(message, true);
            chatInput.value = '';
            chatInput.disabled = true;

            const aiPill = appendMessage("...", false);
            let aiText = "";

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error("HTTP error " + response.status);
                }

                aiPill.textContent = "";
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, {stream: true});
                    aiText += chunk;
                    aiPill.textContent = aiText;
                    chatLog.scrollTop = chatLog.scrollHeight;
                }
            } catch (err) {
                console.error(err);
                aiPill.textContent = "ごめん、通信エラー起きちゃった！サーバー動いてる？";
                aiPill.classList.add("text-red-400");
            } finally {
                chatInput.disabled = false;
                chatInput.focus();
            }
        });

        // Textarea Enter key logic (Submit on Enter, newline on Shift+Enter)
        chatInput.addEventListener('keydown', (e) => {
            // 漢字変換中（IME入力中）のEnterキーは送信を無視する
            if (e.isComposing || e.keyCode === 229) {
                return;
            }
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        // 3. Clear Context Logic
        const clearBtn = document.getElementById('clear-btn');
        clearBtn.addEventListener('click', async () => {
            clearBtn.disabled = true;
            clearBtn.textContent = '...';
            try {
                await fetch('/clear', { method: 'POST' });
                const msg = appendMessage("（💡 新しい動画だね！話題をリセットしたよ！）", false);
                msg.classList.replace('bg-slate-800', 'bg-transparent');
                msg.classList.add('text-slate-400', 'text-sm', 'italic');
            } catch (e) {
                console.error(e);
            } finally {
                clearBtn.innerHTML = '🧹 話題をリセット';
                clearBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
